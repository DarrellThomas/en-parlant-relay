# fly.toml app configuration file generated for en-parlant-relay on 2026-03-05T05:01:48-06:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'en-parlant-relay'
primary_region = 'iad'
kill_signal = 'SIGTERM'
kill_timeout = '5s'

[build]

[http_service]
  internal_port = 3210
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 250
    soft_limit = 200

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
